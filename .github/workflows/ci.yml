name: AetherRepo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AetherRepo
        uses: actions/checkout@v4
        with:
          path: AetherRepo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout source repositories
        run: python3 AetherRepo/scripts/checkout_manifest_sources.py AetherRepo/repo-sources.json Sources

      - name: Build repository feed
        run: python3 AetherRepo/build_repo.py --sources-manifest AetherRepo/repo-sources.json --source-root Sources --github-branch main

      - name: Validate repository feed
        run: python3 AetherRepo/scripts/validate_repo.py AetherRepo

      - name: Ensure generated files are committed
        working-directory: AetherRepo
        run: git diff --exit-code -- .
