name: Publish AetherRepo

on:
  repository_dispatch:
    types: [source-updated]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-aetherrepo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AetherRepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout source repositories
        run: python3 scripts/checkout_manifest_sources.py repo-sources.json Sources

      - name: Build repository feed
        run: python3 build_repo.py --sources-manifest repo-sources.json --source-root Sources --github-branch main

      - name: Validate repository feed
        run: python3 scripts/validate_repo.py .

      - name: Commit repository update
        run: |
          if git diff --quiet --exit-code && [ -z "$(git status --short)" ]; then
            echo "No repository changes."
            exit 0
          fi
          git config user.name "aetherrepo-publisher[bot]"
          git config user.email "aetherrepo-publisher[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update repository feed from source repositories"
          git push
